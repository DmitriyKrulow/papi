<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPI - Платформа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .api-status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .api-status h2 {
            color: #495057;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 10px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #495057;
            font-weight: 500;
        }

        .status-value {
            color: #28a745;
            font-weight: 600;
            font-family: monospace;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .links {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .links a {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: #e9ecef;
            color: #495057;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }

        .links a:hover {
            background: #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PAPI</h1>
        <p>Платформа обработки платежей и управления активами</p>

        <div class="api-status">
            <h2>Статус API</h2>
            <div class="status-item">
                <span class="status-label">Сервер:</span>
                <span class="status-value">Online</span>
            </div>
            <div class="status-item">
                <span class="status-label">База данных:</span>
                <span class="status-value">Подключено</span>
            </div>
            <div class="status-item">
                <span class="status-label">Версия API:</span>
                <span class="status-value">v1.0</span>
            </div>
        </div>

        <a href="/docs" class="btn">Документация API</a>

        <div class="links">
            <a href="/db-check">Проверка БД</a>
            <a href="https://github.com/GigaCode-ai/gigacode/issues" target="_blank">Поддержка</a>
        </div>
    </div>
</body>
</html>
